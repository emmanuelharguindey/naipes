name: Rust port — tests

on:
  push:
    branches: [main]
    paths:
      - "ports/rust/**"
      - "spec/vectors/**"
      - ".github/workflows/rust-test.yml"
  pull_request:
    paths:
      - "ports/rust/**"
      - "spec/vectors/**"
      - ".github/workflows/rust-test.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.70"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ports/rust/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('ports/rust/Cargo.lock') }}

      - name: Build
        working-directory: ports/rust
        run: cargo build --verbose

      - name: Run tests (incl. conformance against spec/vectors)
        working-directory: ports/rust
        run: cargo test --verbose

      - name: Quick CLI smoke test
        working-directory: ports/rust
        shell: bash
        run: |
          cargo build --release
          ./target/release/naipes --version
          ./target/release/naipes list
          OUT=$(printf '1\n%.0s' {1..20} | ./target/release/naipes play brisca --seed 42 --quiet | tail -1)
          echo "Got: $OUT"
          [ "$OUT" = "RESULT human=40 ai=80 outcome=loss" ] || (echo "DETERMINISM BROKEN"; exit 1)
