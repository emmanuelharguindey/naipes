name: TypeScript port — tests

on:
  push:
    branches: [main]
    paths:
      - "ports/typescript/**"
      - "spec/vectors/**"
      - ".github/workflows/typescript-test.yml"
  pull_request:
    paths:
      - "ports/typescript/**"
      - "spec/vectors/**"
      - ".github/workflows/typescript-test.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: ports/typescript
        run: npm install

      - name: Compile TypeScript
        working-directory: ports/typescript
        run: npx tsc

      - name: Run tests (incl. conformance against spec/vectors)
        working-directory: ports/typescript
        run: npx tsx --test tests/*.test.ts

      - name: Quick CLI smoke test
        working-directory: ports/typescript
        shell: bash
        run: |
          node dist/cli/bin.js --version
          node dist/cli/bin.js list
          OUT=$(printf '1\n%.0s' {1..20} | node dist/cli/bin.js play brisca --seed 42 --quiet | tail -1)
          echo "Got: $OUT"
          [ "$OUT" = "RESULT human=40 ai=80 outcome=loss" ] || (echo "DETERMINISM BROKEN"; exit 1)
