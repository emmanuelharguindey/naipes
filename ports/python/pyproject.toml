[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "naipes"
version = "0.1.0"
description = "Spanish card games on the command line. v0.1.0 ships brisca."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "Manuel Harguindey" },
]
keywords = ["cards", "brisca", "spanish-cards", "cli", "game"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Natural Language :: Spanish",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Games/Entertainment :: Board Games",
]

[project.scripts]
naipes = "naipes.cli:main"

[project.urls]
Homepage = "https://github.com/naipes-com/naipes"
Issues = "https://github.com/naipes-com/naipes/issues"
Specification = "https://github.com/naipes-com/naipes/blob/main/spec/SPEC.md"

[tool.hatch.build.targets.wheel]
packages = ["naipes"]

[tool.hatch.build.targets.sdist]
include = [
    "/naipes",
    "/tests",
    "/README.md",
]
